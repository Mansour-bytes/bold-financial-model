// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(v){
  if(v===null||v===undefined||isNaN(v))return"&#8212;";
  var abs=Math.abs(v);
  var s=abs>=1e6?(abs/1e6).toFixed(2)+"M":abs>=1e3?(abs/1e3).toFixed(0)+"K":abs.toLocaleString();
  return v<0?"("+s+")":s;
}
function fmtp(v){
  if(v===null||v===undefined||isNaN(v))return"&#8212;";
  return(v*100).toFixed(1)+"%";
}
function pc(a,b){return b?a/b:null;}
function compute(d){
  var rev=[0,0,0],base=ACT.rev[4];
  for(var i=0;i<3;i++){rev[i]=Math.round(base*(1+d.rev_growth[i]));base=rev[i];}
  var cos_e=rev.map(function(r,i){return Math.round(r*d.cos_e_pct[i]);});
  var cos_d=rev.map(function(r,i){return Math.round(r*d.cos_d_pct[i]);});
  var cos_t=rev.map(function(_,i){return cos_e[i]+cos_d[i];});
  var gp=rev.map(function(_,i){return rev[i]-cos_t[i];});
  var sa=rev.map(function(r,i){return Math.round(r*d.sa_pct[i]);});
  var sa_sal=sa.map(function(s,i){return Math.round(s*d.sa_sal_pct[i]);});
  var sa_bon=sa.map(function(s,i){return Math.round(s*d.sa_bon_pct[i]);});
  var sa_mkt=sa.map(function(s,i){return Math.round(s*d.sa_mkt_pct[i]);});
  var sa_frl=sa.map(function(s,i){return Math.round(s*d.sa_frl_pct[i]);});
  var sa_oth=sa.map(function(s,i){return s-sa_sal[i]-sa_bon[i]-sa_mkt[i]-sa_frl[i];});
  var ga=rev.map(function(r,i){return Math.round(r*d.ga_pct[i]);});
  var ga_sal=ga.map(function(g,i){return Math.round(g*d.ga_sal_pct[i]);});
  var ga_rnt=ga.map(function(g,i){return Math.round(g*d.ga_rnt_pct[i]);});
  var ga_tch=ga.map(function(g,i){return Math.round(g*d.ga_tch_pct[i]);});
  var ga_leg=ga.map(function(g,i){return Math.round(g*d.ga_leg_pct[i]);});
  var ga_oth=ga.map(function(g,i){return g-ga_sal[i]-ga_rnt[i]-ga_tch[i]-ga_leg[i];});
  var dep=rev.map(function(r,i){return Math.round(r*d.dep_pct[i]);});
  var ebitda=gp.map(function(_,i){return gp[i]-sa[i]-ga[i];});
  var ebit=ebitda.map(function(_,i){return ebitda[i]-dep[i];});
  var zakat=ebit.map(function(e,i){return e>0?Math.round(e*d.zakat_pct[i]):0;});
  var np=ebit.map(function(_,i){return ebit[i]-zakat[i];});
  return{rev:rev,cos_e:cos_e,cos_d:cos_d,cos_t:cos_t,gp:gp,sa:sa,sa_sal:sa_sal,sa_bon:sa_bon,sa_mkt:sa_mkt,sa_frl:sa_frl,sa_oth:sa_oth,ga:ga,ga_sal:ga_sal,ga_rnt:ga_rnt,ga_tch:ga_tch,ga_leg:ga_leg,ga_oth:ga_oth,dep:dep,ebitda:ebitda,ebit:ebit,zakat:zakat,np:np};
}

// ── ROW BUILDER ───────────────────────────────────────────────────────────────
function secRow(lbl){return'<tr class="sec-row"><td colspan="100">'+lbl+'</td></tr>';}
function nTd(v,bg,isTotal,isPct){
  var neg=typeof v==="number"&&v<0;
  var col=neg?"color:#dc2626;":(isTotal?"color:#fff;":"");
  var bgS=bg?"background:"+bg+";":"";
  return'<td style="'+bgS+col+'text-align:right;font-size:'+(isPct?9:11)+'px">'+(isPct?fmtp(v):fmt(v))+'</td>';
}
function pTd(v,base,bg){
  var p=(base&&typeof v==="number"&&typeof base==="number")?v/base:null;
  return'<td class="pct-td" style="background:'+(bg||"#fff")+'">'+(p!==null?fmtp(p):"")+'</td>';
}
function drvTd(key){
  if(!key)return'<td class="drv-td"></td>';
  var ins=S.drv[key].map(function(v,i){
    return'<input type="number" step="0.1" value="'+(v*100).toFixed(1)+'" data-k="'+key+'" data-i="'+i+'">';
  }).join("");
  return'<td class="drv-td">'+ins+'</td>';
}
function buildRow(o){
  var isTotal=o.isTotal,isSub=o.isSub,isPct=o.isPct,indent=o.indent;
  var lbg=isTotal?"#111827":isSub?"#f1f5f9":"#fff";
  var lco=isTotal?"#fff":isSub?"#111827":"#374151";
  var lfw=isTotal||isSub?"font-weight:700":"";
  var aBg=isTotal?"#111827":"#eff6ff";
  var mBg=isTotal?"#111827":"#f0fdf4";
  var cBg=isTotal?"#111827":"#fffbeb";
  var bench=BENCH[o.benchKey];
  var h='<tr>';
  h+='<td class="label-col" style="background:'+lbg+';color:'+lco+';'+lfw+';padding-left:'+(indent?22:10)+'px">'+o.label+'</td>';
  if(!o.noAct){
    o.actVals.forEach(function(v,i){
      h+=nTd(v,aBg,isTotal,isPct);
      if(!isPct)h+=pTd(v,o.actRevs[i],aBg);
    });
  }
  o.modelVals.forEach(function(v,i){
    h+=nTd(v,mBg,isTotal,isPct);
    if(!isPct)h+=pTd(v,o.modelRevs[i],mBg);
  });
  o.cfoVals.forEach(function(v,i){
    h+=nTd(v,cBg,isTotal,isPct);
    if(!isPct)h+=pTd(v,o.cfoRevs[i],cBg);
  });
  h+=drvTd(o.drvKey);
  h+='<td class="bench-td">'+(bench?bench.pct:"&#8212;")+'</td>';
  h+='<td class="remark-td">'+(bench?bench.note:"")+'</td>';
  h+='</tr>';
  return h;
}

// ── TABLE HEADER ──────────────────────────────────────────────────────────────
function grpHdr(actFys){
  var h='<tr><th class="tl" style="min-width:190px;position:sticky;left:0;z-index:4;background:#111827">Line Item (SAR)</th>';
  actFys.forEach(function(y){

    h+='<th style="background:#1e40af;min-width:36px">%</th>';
  });
  ["FY26P","FY27P","FY28P"].forEach(function(y){
    h+='<th style="background:#15803d">'+y+'<br><span style="color:#86efac;font-size:8px">Model</span></th>';
    h+='<th style="background:#15803d;min-width:36px">%</th>';
  });
  ["FY26P","FY27P","FY28P"].forEach(function(y){
    h+='<th style="background:#92400e">'+y+'<br><span style="color:#fcd34d;font-size:8px">CFO View</span></th>';
    h+='<th style="background:#92400e;min-width:36px">%</th>';
  });
  h+='<th style="background:#92400e;min-width:155px">Driver Inputs<br><span style="font-size:8px">FY26 / FY27 / FY28</span></th>';
  h+='<th style="background:#5b21b6;min-width:80px">Benchmark %</th>';
  h+='<th class="tl" style="background:#5b21b6;min-width:240px">CFO Remarks</th>';
  h+='</tr>';
  return h;
}

// ── GROUP P&L ─────────────────────────────────────────────────────────────────
function renderGroup(){
  var M=compute(S.drv),F=compute(CFO_ADJ);
  var aR=ACT.rev,mR=M.rev,fR=F.rev;
  function r(o){o.actRevs=aR;o.modelRevs=mR;o.cfoRevs=fR;return buildRow(o);}
  var html='<div class="table-wrap"><table style="min-width:1800px"><thead>'+grpHdr(["FY21","FY22","FY23","FY24","FY25"])+'</thead><tbody>';
  html+=secRow("REVENUE");
  html+=r({label:"Total Revenue",actVals:aR,modelVals:mR,cfoVals:fR,isTotal:true,drvKey:"rev_growth",benchKey:"rev_growth"});
  html+=r({label:"&nbsp;&nbsp;YoY Growth %",indent:true,isPct:true,noAct:false,
    actVals:aR.map(function(_,i){return i===0?null:pc(aR[i]-aR[i-1],aR[i-1]);}),
    modelVals:mR.map(function(v,i){return i===0?pc(v-aR[4],aR[4]):pc(v-mR[i-1],mR[i-1]);}),
    cfoVals:fR.map(function(v,i){return i===0?pc(v-aR[4],aR[4]):pc(v-fR[i-1],fR[i-1]);}),
    benchKey:"rev_growth"});

    return'<tr style="background:'+(isDone?"#f9fafb":bgs[r.p])+';opacity:'+(isDone?0.55:1)+'">'
      +'<td style="text-align:center;font-size:16px;padding:5px 6px">'+r.p+'</td>'
      +'<td style="color:'+fgs[r.p]+';text-align:center;font-weight:700;padding:5px 8px">'+r.id+'</td>'
      +'<td style="padding:6px 10px;text-decoration:'+(isDone?"line-through":"none")+';color:'+(isDone?"#6b7280":"#374151")+';text-align:left">'+r.item+'</td>'
      +'<td style="padding:6px 8px;white-space:nowrap;text-align:left">'+r.owner+'</td>'
      +'<td style="padding:6px 8px;font-size:10px;font-style:italic;color:#6b7280;min-width:180px;text-align:left">'+r.impact+'</td>'
      +'<td style="padding:6px 8px;text-align:center;font-size:10px;white-space:nowrap;color:#6b7280">'+r.by+'</td>'
      +'<td style="text-align:center;padding:5px 8px">'
      +'<button onclick="togOI('+r.id+')" style="background:'+(isDone?"#f0fdf4":"#fff")+';border:1px solid '+(isDone?"#16a34a":"#d1d5db")+';color:'+(isDone?"#16a34a":"#6b7280")+';border-radius:4px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer">'+(isDone?"&#10003; DONE":"PENDING")+'</button>'
      +'</td></tr>';
  }).join("");
  return'<div class="prog-wrap">'
    +'<div class="prog-score"><div class="prog-val">'+done+'/'+total+'</div><div style="color:#6b7280;font-size:10px">Complete</div></div>'
    +'<div style="flex:1"><div class="prog-bar"><div class="prog-fill" style="width:'+Math.round(done/total*100)+'%"></div></div>'
    +'<div style="color:#6b7280;font-size:10px;margin-top:4px">'+(total-done)+' items remaining before Havas pitch</div></div></div>'
    +'<table style="width:100%"><thead><tr>'
    +['','#','Action Item','Owner','Investor Impact','By When','Status'].map(function(h,i){return'<th class="'+(i>=2&&i<=4?"tl":"")+'">'+h+'</th>';}).join('')
    +'</tr></thead><tbody>'+rows+'</tbody></table>';
}

// ── KPI STRIP ─────────────────────────────────────────────────────────────────
function renderKPIs(){
  var M=compute(S.drv),F=compute(CFO_ADJ);
  var kpis=[
    {l:"FY26P Revenue",v:"SAR "+(M.rev[0]/1e6).toFixed(1)+"M",c:"#1d4ed8"},
    {l:"FY26P GP%",v:fmtp(M.gp[0]/M.rev[0]),c:M.gp[0]/M.rev[0]>0.50?"#16a34a":"#b45309"},
    {l:"FY26P EBITDA%",v:fmtp(M.ebitda[0]/M.rev[0]),c:M.ebitda[0]/M.rev[0]>0.13?"#16a34a":"#b45309"},
    {l:"FY26P NP%",v:fmtp(M.np[0]/M.rev[0]),c:M.np[0]/M.rev[0]>0.08?"#16a34a":"#b45309"},
    {l:"FY27P Revenue",v:"SAR "+(M.rev[1]/1e6).toFixed(1)+"M",c:"#1d4ed8"},
    {l:"FY27P EBITDA%",v:fmtp(M.ebitda[1]/M.rev[1]),c:M.ebitda[1]/M.rev[1]>0.15?"#16a34a":"#b45309"},
    {l:"FY27P NP%",v:fmtp(M.np[1]/M.rev[1]),c:M.np[1]/M.rev[1]>0.10?"#16a34a":"#b45309"},
    {l:"FY28P Revenue",v:"SAR "+(M.rev[2]/1e6).toFixed(1)+"M",c:"#1d4ed8"},
    {l:"FY28P NP%",v:fmtp(M.np[2]/M.rev[2]),c:M.np[2]/M.rev[2]>0.12?"#16a34a":"#b45309"},
    {l:"CFO FY27P NP%",v:fmtp(F.np[1]/F.rev[1]),c:"#b45309"}
  ];
  return kpis.map(function(k){
    return'<div class="kpi"><div class="kpi-val" style="color:'+k.c+'">'+k.v+'</div><div class="kpi-lbl">'+k.l+'</div></div>';
  }).join("");
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
var TABS=["Group P&L","Bold Co.","Teeb","Captains","Benchmarks","Open Items"];
var RENDERERS=[renderGroup,function(){return renderEntity("bold");},function(){return renderEntity("teeb");},function(){return renderEntity("captains");},renderBench,renderOI];

function render(){
  var tabBtns=TABS.map(function(t,i){
    return'<button class="tab-btn'+(S.tab===i?" active":"")+'" onclick="setTab('+i+')">'+(i+1)+'. '+t+'</button>';
  }).join("");
  document.getElementById("app").innerHTML=
    '<div class="header">'
    +'<div><div class="header-title">the bold group_ &#8212; CFO Financial Model v4.0</div>'
    +'<div class="header-sub">SAR Exact &middot; Actuals FY21-25 &middot; Model + CFO Projections FY26-28 &middot; March 2026 &middot; Pre-Havas/BETC Pitch</div></div>'
    +'<div class="legend">'
    +'<span style="background:#eff6ff;border:1.5px solid #1e40af;color:#1e40af">Actuals</span>'
    +'<span style="background:#f0fdf4;border:1.5px solid #15803d;color:#15803d">Model Projection</span>'
    +'<span style="background:#fffbeb;border:1.5px solid #92400e;color:#92400e">CFO View</span>'
    +'<span style="background:#f5f3ff;border:1.5px solid #5b21b6;color:#5b21b6">Industry Benchmark</span>'
    +'</div></div>'
    +'<div class="kpi-strip">'+renderKPIs()+'</div>'
    +'<div class="tabs">'+tabBtns+'<div class="tab-hint">&#9998; Edit amber % inputs &#8594; all tabs update live</div></div>'
    +'<div class="content">'+RENDERERS[S.tab]()+'</div>';

  // Driver input listeners
  document.querySelectorAll("input[data-k]").forEach(function(inp){
    inp.addEventListener("change",function(e){
      var k=e.target.dataset.k,i=parseInt(e.target.dataset.i),v=parseFloat(e.target.value);
      if(!isNaN(v)){S.drv[k][i]=v/100;render();}
    });
  });
}

window.setTab=function(i){S.tab=i;render();};
window.setBF=function(f){S.bf=f;render();};
window.togOI=function(id){S.oi[id]=S.oi[id]==="DONE"?"PENDING":"DONE";render();};

render();
</script>

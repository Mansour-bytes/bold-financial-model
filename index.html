<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>the bold group_ — CFO Financial Model v4.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
html{-webkit-text-size-adjust:100%}
body{background:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#111827;font-size:13px;min-width:320px;display:flex;flex-direction:column}
button,input,select{font-family:inherit;cursor:pointer}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:#111827;color:#4ade80;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;opacity:0;transition:opacity 0.3s;z-index:9999;pointer-events:none;max-width:280px;text-align:center}
#toast.show{opacity:1}

/* SAVE MODAL */
#save-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:8888;align-items:center;justify-content:center}
#save-modal.open{display:flex}
.modal-box{background:#1e293b;border-radius:10px;padding:24px;max-width:420px;width:90%;border:1px solid #334155}
.modal-title{color:#4ade80;font-weight:800;font-size:15px;margin-bottom:4px}
.modal-sub{color:#94a3b8;font-size:11px;margin-bottom:18px;line-height:1.5}
.modal-btn{display:block;width:100%;border:none;border-radius:6px;padding:11px 16px;font-size:13px;font-weight:700;margin-bottom:10px;text-align:left;cursor:pointer;transition:opacity 0.15s}
.modal-btn:hover{opacity:0.88}
.modal-btn-mine{background:#1d4ed8;color:#fff}
.modal-btn-team{background:#15803d;color:#fff}
.modal-btn-load-mine{background:#374151;color:#e2e8f0}
.modal-btn-load-team{background:#374151;color:#e2e8f0}
.modal-btn-clear{background:#7f1d1d;color:#fff}
.modal-btn-cancel{background:#334155;color:#9ca3af;margin-bottom:0}
.modal-badge{display:inline-block;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:8px;vertical-align:middle}
.modal-divider{border:none;border-top:1px solid #334155;margin:14px 0}

/* HEADER */
.hdr{background:#111827;padding:10px 14px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-left{flex:1;min-width:200px}
.hdr-title{color:#4ade80;font-weight:800;font-size:14px;line-height:1.3}
.hdr-sub{color:#9ca3af;font-size:10px;margin-top:3px;line-height:1.4}
.legend{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.legend span{border-radius:3px;padding:2px 7px;font-size:9px;font-weight:700;border-width:1.5px;border-style:solid;white-space:nowrap}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.save-status{font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;white-space:nowrap}

/* KPI */
.kpi-strip{display:grid;grid-template-columns:repeat(10,1fr);background:#fff;border-bottom:1px solid #e5e7eb}
.kpi{padding:7px 8px;text-align:center;border-right:1px solid #e5e7eb}
.kpi:last-child{border-right:none}
.kpi-val{font-size:12px;font-weight:800;line-height:1.2}
.kpi-lbl{color:#6b7280;font-size:8px;margin-top:2px;line-height:1.2}
@media(max-width:1024px){.kpi-strip{grid-template-columns:repeat(5,1fr)}.kpi:nth-child(n+6){border-top:1px solid #e5e7eb}}
@media(max-width:600px){.kpi-strip{grid-template-columns:repeat(3,1fr)}.kpi:nth-child(n+7){display:none}}

/* PLANNER BAR */
.planner-bar{background:#1e293b;padding:7px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:2px solid #334155}
.planner-bar label{color:#94a3b8;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.planner-bar select{background:#334155;border:1px solid #475569;color:#e2e8f0;border-radius:4px;padding:4px 8px;font-size:11px;min-height:28px}
.planner-bar input[type=range]{width:100px;accent-color:#4ade80}
#rev-slide-val{color:#4ade80;font-weight:700;font-size:11px;min-width:38px}
.scenario-badge{border-radius:4px;padding:3px 9px;font-size:10px;font-weight:700;border:1px solid;white-space:nowrap}
.planner-actions{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.btn-sm{border:none;border-radius:4px;padding:5px 10px;font-size:10px;font-weight:700;white-space:nowrap;min-height:26px}
@media(max-width:768px){.planner-bar input[type=range]{width:70px}.planner-actions{margin-left:0;width:100%}}

/* TABS */
.tabs-wrap{background:#fff;border-bottom:2px solid #e5e7eb;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs{display:flex;min-width:max-content}
.tab-btn{background:transparent;border:none;border-bottom:3px solid transparent;color:#6b7280;font-size:11px;padding:9px 13px;white-space:nowrap;margin-bottom:-2px;min-height:38px}
.tab-btn.active{color:#16a34a;font-weight:700;border-bottom-color:#16a34a}
.tab-hint{padding:9px 12px;color:#b45309;font-size:10px;font-weight:700;white-space:nowrap;align-self:center}

/* CONTENT */
.content{padding:10px}

/* TABLES */
.table-wrap{overflow:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;table-layout:auto}
th{background:#111827;color:#fff;font-size:11px;font-weight:700;padding:6px 7px;text-align:center;white-space:nowrap;border-bottom:2px solid #d1d5db;position:sticky;top:0;z-index:10}
th.tl{text-align:left}
/* label col wider, data cols have explicit min-widths */
th.col-lbl{width:18%;min-width:180px;text-align:left}
th.col-act{min-width:72px;background:#1e40af}
th.col-mod{min-width:72px;background:#15803d}
th.col-cfo{min-width:72px;background:#92400e}
th.col-drv{min-width:110px;background:#78350f}
th.col-bnc{min-width:70px;background:#5b21b6}
td{padding:3px 5px;border-bottom:1px solid #e5e7eb;font-size:10px;text-align:right;white-space:nowrap}
td.lc{position:sticky;left:0;z-index:3;border-right:1px solid #d1d5db;font-size:10px;padding:3px 6px;text-align:left;background:#fff;min-width:180px;max-width:260px;white-space:normal;word-break:break-word}
/* stacked val+% in one cell */
.cv{display:block;font-size:10px;line-height:1.3;font-weight:600}
.cp{display:block;font-size:8px;line-height:1.1;color:#6b7280}
.ct .cp{color:#9ca3af}
.sec-row td{background:#f1f5f9!important;color:#6b7280;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-top:2px solid #d1d5db;text-align:left;padding:5px 8px}
.drv-td{background:#fffbeb;padding:1px 2px;text-align:left;border-left:1px solid #d1d5db}
.drv-input{width:34px;background:#fef3c7;border:1px solid #b45309;color:#b45309;border-radius:2px;font-size:9px;padding:1px 2px;text-align:right;outline:none;font-weight:700;min-height:18px;-webkit-appearance:none}
.bu-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.drv-input.changed{background:#fde68a;border-color:#92400e}

/* FREEZE TOP — natural page scroll */
#hdr-zone{position:sticky;top:0;z-index:50}
#kpi-zone{position:sticky;top:0;z-index:49}
#planner-zone{position:sticky;top:0;z-index:48}
#tabs-zone{position:sticky;top:0;z-index:47}
#app{display:flex;flex-direction:column;height:100%}
#content-zone{flex:1;overflow-y:auto;overflow-x:clip}
.info-green{background:#f0fdf4;border-left:4px solid #16a34a;color:#14532d;padding:7px 12px;margin-bottom:10px;border-radius:4px;font-size:10px;line-height:1.5}
.info-blue{background:#eff6ff;border:1px solid #1d4ed8;border-radius:5px;color:#1d4ed8;padding:8px 12px;margin-bottom:10px;font-size:10px;line-height:1.5}

/* BU */
.bu-title{font-weight:700;font-size:12px;color:#111827;border-bottom:2px solid #16a34a;padding-bottom:5px;margin:18px 0 12px}
.bu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:12px}
@media(max-width:860px){.bu-grid{grid-template-columns:1fr}}
.bu-card{background:#fff;border:1px solid #e5e7eb;border-radius:6px;border-top:3px solid #16a34a}
.bu-hdr{background:#f0fdf4;padding:7px 10px;font-weight:700;font-size:11px;color:#14532d;border-bottom:1px solid #e5e7eb}

/* FILTER */
.filter-bar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.fb{background:#fff;border:1px solid #d1d5db;color:#6b7280;border-radius:4px;padding:4px 9px;font-size:10px;min-height:26px}
.fb.active{background:#f0fdf4;border-color:#16a34a;color:#16a34a;font-weight:700}

/* OPEN ITEMS */
.prog-wrap{display:flex;gap:12px;padding:0 0 12px;align-items:center;flex-wrap:wrap}
.prog-score{background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:7px 14px;text-align:center;min-width:78px}
.prog-bar-bg{background:#e5e7eb;border-radius:4px;height:7px;flex:1;min-width:80px}
.prog-fill{height:100%;background:#16a34a;border-radius:4px;transition:width .3s}
</style>
</head>

<div id="save-modal">

    <div class="modal-title">&#9729; Save / Load Inputs</div>

  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// STORAGE KEYS
// ─────────────────────────────────────────────────────────────────────────────
var KEY_MINE  = 'bold-cfo-v4-mine';
var KEY_TEAM  = 'bold-cfo-v4-team';
var KEY_MY_TS = 'bold-cfo-v4-mine-ts';
var KEY_TM_TS = 'bold-cfo-v4-team-ts';

var saveTimer = null;
var currentVersion = 'none'; // 'mine' | 'team' | 'none'

function ts(){ return new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }

async function storageSave(key, val, shared){
  try{
    if(window.storage){ await window.storage.set(key, JSON.stringify(val), !!shared); return true; }
  }catch(e){}
  try{ localStorage.setItem(key, JSON.stringify(val)); return true; }catch(e){ return false; }
}
async function storageGet(key, shared){
  try{
    if(window.storage){
      var r = await window.storage.get(key, !!shared);
      if(r && r.value) return JSON.parse(r.value);
    }
  }catch(e){}
  try{ var v=localStorage.getItem(key); if(v) return JSON.parse(v); }catch(e){}
  return null;
}
async function storageDel(key, shared){
  try{ if(window.storage) await window.storage.delete(key, !!shared); }catch(e){}
  try{ localStorage.removeItem(key); }catch(e){}
}

function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2500); }

function updateSaveStatus(){
  var el=document.getElementById('save-status');
  if(!el) return;
  if(currentVersion==='mine')      { el.textContent='&#128100; My Version'; el.style.cssText='font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;background:#eff6ff;color:#1d4ed8;border:1px solid #1d4ed8'; }
  else if(currentVersion==='team') { el.textContent='&#128101; Team Version'; el.style.cssText='font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;background:#f0fdf4;color:#15803d;border:1px solid #15803d'; }
  else                             { el.textContent='Base Case'; el.style.cssText='font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;background:#f1f5f9;color:#6b7280;border:1px solid #d1d5db'; }
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
async function openModal(){
  // Fetch timestamps for display
  var myTs  = await storageGet(KEY_MY_TS, false);
  var tmTs  = await storageGet(KEY_TM_TS, true);
  var myEl  = document.getElementById('my-ts');
  var tmEl  = document.getElementById('team-ts');
  if(myEl) myEl.textContent = myTs ? '('+myTs+')' : '(no save found)';
  if(tmEl) tmEl.textContent = tmTs ? '('+tmTs+')' : '(no save found)';
  document.getElementById('save-modal').classList.add('open');
}
function closeModal(){ document.getElementById('save-modal').classList.remove('open'); }

async function doSave(who){
  var shared = (who==='team');
  var key    = shared ? KEY_TEAM : KEY_MINE;
  var tsKey  = shared ? KEY_TM_TS : KEY_MY_TS;
  var label  = shared ? '&#128101; Team Version' : '&#128100; My Version';
  var ok = await storageSave(key, S.drv, shared);
  await storageSave(tsKey, ts(), shared);
  currentVersion = who;
  closeModal();
  if(ok){ showToast('Saved as '+label+' ✓'); updateSaveStatus(); }
  else   { showToast('Save failed — check connection'); }
}

async function doLoad(who){
  var shared = (who==='team');
  var key    = shared ? KEY_TEAM : KEY_MINE;
  var label  = shared ? '&#128101; Team Version' : '&#128100; My Version';
  var saved  = await storageGet(key, shared);
  closeModal();
  if(saved){
    S.drv = saved;
    S.scenario = 'custom';
    currentVersion = who;
    fullRender();
    showToast('Loaded '+label+' ✓');
  } else {
    showToast('No saved '+label+' found');
  }
}

async function doClear(){
  if(!confirm('Clear ALL saved data (My Version + Team Version) and reset to Base Case?')) return;
  await storageDel(KEY_MINE, false);
  await storageDel(KEY_TEAM, true);
  await storageDel(KEY_MY_TS, false);
  await storageDel(KEY_TM_TS, true);
  S.drv = deepCopy(BASE_DRV);
  S.scenario = 'base';
  currentVersion = 'none';
  closeModal();
  fullRender();
  showToast('All saved data cleared ✓');
}

function fmt(v){
  if(v===null||v===undefined||isNaN(v))return"&#8212;";
  var abs=Math.abs(v);
  var s=abs>=1e6?(abs/1e6).toFixed(2)+"M":abs>=1e3?(abs/1e3).toFixed(0)+"K":abs.toLocaleString();
  return v<0?"("+s+")":s;
}
function fmtp(v){return(v===null||v===undefined||isNaN(v))?"&#8212;":(v*100).toFixed(1)+"%";}
function pc(a,b){return b?a/b:null;}
function compute(d){
  var rev=[0,0,0],base=ACT.rev[4];
  for(var i=0;i<3;i++){rev[i]=Math.round(base*(1+d.rev_growth[i]));base=rev[i];}
  var ce=rev.map(function(r,i){return Math.round(r*d.cos_e_pct[i]);});
  var cd=rev.map(function(r,i){return Math.round(r*d.cos_d_pct[i]);});
  var ct=rev.map(function(_,i){return ce[i]+cd[i];});
  var gp=rev.map(function(_,i){return rev[i]-ct[i];});
  var sa=rev.map(function(r,i){return Math.round(r*d.sa_pct[i]);});
  var ss=sa.map(function(s,i){return Math.round(s*d.sa_sal_pct[i]);});
  var sb=sa.map(function(s,i){return Math.round(s*d.sa_bon_pct[i]);});
  var sm=sa.map(function(s,i){return Math.round(s*d.sa_mkt_pct[i]);});
  var sf=sa.map(function(s,i){return Math.round(s*d.sa_frl_pct[i]);});
  var so=sa.map(function(s,i){return s-ss[i]-sb[i]-sm[i]-sf[i];});
  var ga=rev.map(function(r,i){return Math.round(r*d.ga_pct[i]);});
  var gs=ga.map(function(g,i){return Math.round(g*d.ga_sal_pct[i]);});
  var gr=ga.map(function(g,i){return Math.round(g*d.ga_rnt_pct[i]);});
  var gt=ga.map(function(g,i){return Math.round(g*d.ga_tch_pct[i]);});
  var gl=ga.map(function(g,i){return Math.round(g*d.ga_leg_pct[i]);});
  var go=ga.map(function(g,i){return g-gs[i]-gr[i]-gt[i]-gl[i];});
  var dep=rev.map(function(r,i){return Math.round(r*d.dep_pct[i]);});
  var eb=gp.map(function(_,i){return gp[i]-sa[i]-ga[i];});
  var ei=eb.map(function(_,i){return eb[i]-dep[i];});
  var zk=ei.map(function(e,i){return e>0?Math.round(e*d.zakat_pct[i]):0;});
  var np=ei.map(function(_,i){return ei[i]-zk[i];});
  return{rev:rev,cos_e:ce,cos_d:cd,cos_t:ct,gp:gp,sa:sa,sa_sal:ss,sa_bon:sb,sa_mkt:sm,sa_frl:sf,sa_oth:so,ga:ga,ga_sal:gs,ga_rnt:gr,ga_tch:gt,ga_leg:gl,ga_oth:go,dep:dep,ebitda:eb,ebit:ei,zakat:zk,np:np};
}

function computeBU(name){
  var a=BU_ACT[name];
  var d=S.bu_drv[name];
  var rev_proj=[
    {"Creatives":22500000,"Brands":9180000,"Experience":9750000,"Influence":7000000}[name],
    {"Creatives":25875000,"Brands":10557000,"Experience":11212500,"Influence":8050000}[name],
    {"Creatives":29756250,"Brands":12140550,"Experience":12894375,"Influence":9257500}[name]
  ];
  // aV = FY23/24/25 actuals (index 0,1,2)
  // mV = FY26/27/28 from drivers (index 0,1,2)
  var aRev=a.rev; // [FY23,FY24,FY25]
  var mRev=rev_proj; // [FY26,FY27,FY28]

  function p(key,i){return Math.round(mRev[i]*d[key+'_pct'][i]);}

  // COS
  var aCos_sal_sa=a.cos_sal_sa; var mCos_sal_sa=[p('cos_sal',0),p('cos_sal',1),p('cos_sal',2)];
  var aCos_sal_eg=a.cos_sal_eg; var mCos_sal_eg=[0,0,0];
  var aCos_ext   =a.cos_ext;    var mCos_ext   =[p('cos_ext',0),p('cos_ext',1),p('cos_ext',2)];
  var aCos_sal=aCos_sal_sa.map(function(v,i){return v+(aCos_sal_eg[i]||0);});
  var mCos_sal=mCos_sal_sa.map(function(v,i){return v+(mCos_sal_eg[i]||0);});
  var aCos_t=aRev.map(function(_,i){return(aCos_ext[i]||0)+(aCos_sal[i]||0);});
  var mCos_t=mRev.map(function(_,i){return(mCos_ext[i]||0)+(mCos_sal[i]||0);});
  var aGp=aRev.map(function(r,i){return r?(r-aCos_t[i]):null;});
  var mGp=mRev.map(function(r,i){return r-mCos_t[i];});

  // S&A sub-lines
  var aSa_sal=a.sa_sal;    var mSa_sal=[p('sa_sal',0),p('sa_sal',1),p('sa_sal',2)];
  var aSa_bon=a.sa_bon;    var mSa_bon=[p('sa_bon',0),p('sa_bon',1),p('sa_bon',2)];
  var aSa_it =a.sa_it;     var mSa_it =[p('sa_it',0), p('sa_it',1), p('sa_it',2)];
  var aSa_luma=a.sa_luma;  var mSa_luma=[p('sa_luma',0),p('sa_luma',1),p('sa_luma',2)];
  var aSa_mkt=a.sa_mkt;    var mSa_mkt=[p('sa_mkt',0),p('sa_mkt',1),p('sa_mkt',2)];
  var aSa_travel=a.sa_travel; var mSa_travel=[p('sa_travel',0),p('sa_travel',1),p('sa_travel',2)];
  var aSa_people=a.sa_people; var mSa_people=[p('sa_people',0),p('sa_people',1),p('sa_people',2)];
  var aSa_misc=a.sa_misc;  var mSa_misc=[p('sa_misc',0),p('sa_misc',1),p('sa_misc',2)];
  var aSa_t=aRev.map(function(_,i){return(aSa_sal[i]||0)+(aSa_bon[i]||0)+(aSa_it[i]||0)+(aSa_luma[i]||0)+(aSa_mkt[i]||0)+(aSa_travel[i]||0)+(aSa_people[i]||0)+(aSa_misc[i]||0);});
  var mSa_t=mRev.map(function(_,i){return mSa_sal[i]+mSa_bon[i]+mSa_it[i]+mSa_luma[i]+mSa_mkt[i]+mSa_travel[i]+mSa_people[i]+mSa_misc[i];});

  // SSF & NP
  var aSsf=a.ssf; var mSsf=[p('ssf',0),p('ssf',1),p('ssf',2)];
  var aOp=aGp.map(function(g,i){return g!==null?g-(aSa_t[i]||0):null;});
  var mOp=mGp.map(function(g,i){return g-mSa_t[i];});
  var aNp=aOp.map(function(o,i){return o!==null?o-(aSsf[i]||0):null;});
  var mNp=mOp.map(function(o,i){return o-mSsf[i];});

  return{
    aRev:aRev,mRev:mRev,
    aCos_sal_sa:aCos_sal_sa,mCos_sal_sa:mCos_sal_sa,
    aCos_sal_eg:aCos_sal_eg,mCos_sal_eg:mCos_sal_eg,
    aCos_sal:aCos_sal,mCos_sal:mCos_sal,
    aCos_ext:aCos_ext,mCos_ext:mCos_ext,
    aCos_t:aCos_t,mCos_t:mCos_t,
    aGp:aGp,mGp:mGp,
    aSa_sal:aSa_sal,mSa_sal:mSa_sal,
    aSa_bon:aSa_bon,mSa_bon:mSa_bon,
    aSa_it:aSa_it,mSa_it:mSa_it,
    aSa_luma:aSa_luma,mSa_luma:mSa_luma,
    aSa_mkt:aSa_mkt,mSa_mkt:mSa_mkt,
    aSa_travel:aSa_travel,mSa_travel:mSa_travel,
    aSa_people:aSa_people,mSa_people:mSa_people,
    aSa_misc:aSa_misc,mSa_misc:mSa_misc,
    aSa_t:aSa_t,mSa_t:mSa_t,
    aSsf:aSsf,mSsf:mSsf,
    aOp:aOp,mOp:mOp,aNp:aNp,mNp:mNp
  };
}

// Bold consolidated NP = BU NPs sum - entity G&A - dep - zakat
function computeBoldConsolidated(){
  var buNames=Object.keys(BU_ACT);
  var np_sum_a=[0,0,0],np_sum_m=[0,0,0];
  buNames.forEach(function(n){
    var r=computeBU(n);
    r.aNp.forEach(function(v,i){np_sum_a[i]+=(v||0);});
    r.mNp.forEach(function(v,i){np_sum_m[i]+=(v||0);});
  });
  var ed=S.entity_drv;
  var entity_m=[ed.ga[0]+ed.dep[0]+ed.zak[0],
                ed.ga[1]+ed.dep[1]+ed.zak[1],
                ed.ga[2]+ed.dep[2]+ed.zak[2]];
  var bold_np_m=np_sum_m.map(function(v,i){return v-entity_m[i];});
  return{np_sum_a:np_sum_a,np_sum_m:np_sum_m,entity_m:entity_m,bold_np_m:bold_np_m};
}

// ─────────────────────────────────────────────────────────────────────────────
// TABLE HELPERS — auto-fit: no inline min-width on table element
// ─────────────────────────────────────────────────────────────────────────────
function tHdr(actFys){
  var h='<tr>'
    +'<th class="tl" style="position:sticky;left:0;z-index:15;background:#111827;min-width:180px;width:18%">Line Item (SAR)</th>';
  actFys.forEach(function(y){
    h+='<th style="background:#1e40af;min-width:80px">'+y+'<br><span style="color:#93c5fd;font-size:9px">Actual</span></th>';
  });
  ["FY26P","FY27P","FY28P"].forEach(function(y){
    h+='<th style="background:#15803d;min-width:80px">'+y+'<br><span style="color:#86efac;font-size:9px">Model</span></th>';
  });
  ["FY26P","FY27P","FY28P"].forEach(function(y){
    h+='<th style="background:#92400e;min-width:80px">'+y+'<br><span style="color:#fcd34d;font-size:9px">CFO</span></th>';
  });
  h+='<th style="background:#92400e;min-width:62px">Drivers %</th>';
  h+='<th style="background:#5b21b6;min-width:70px">Industry<br>Benchmark %</th>';
  h+='<th style="background:#1e293b;min-width:160px;text-align:left;padding-left:8px">CFO Notes &amp; Sources</th>';
  return h;
}
function nTd(v,base,bg,isT,isPct){
  var neg=typeof v==="number"&&v<0;
  var col=neg?(isT?"color:#fca5a5;":"color:#dc2626;"):(isT?"color:#fff;":"");
  if(isPct){
    return'<td style="background:'+bg+';'+col+'font-size:9px;text-align:right;padding:3px 5px">'+fmtp(v)+'</td>';
  }
  var p=(base&&typeof v==="number"&&typeof base==="number"&&base!==0)?fmtp(v/base):"";
  var pc_col=(v/base)<0?"color:#fca5a5;":(isT?"color:#9ca3af;":"color:#6b7280;");
  return'<td style="background:'+bg+';padding:3px 5px;text-align:right;white-space:nowrap">'
    +'<span class="cv" style="'+col+'font-size:10px">'+fmt(v)+'</span>'
    +(p?'<span class="cp" style="'+pc_col+'">'+p+'</span>':"")
    +'</td>';
}
function dTd(key){
  if(!key)return'<td class="drv-td"></td>';
  var yrs=["FY26","FY27","FY28"];
  var ins=[0,1,2].map(function(i){
    var cur=S.drv[key][i],def=BASE_DRV[key][i];
    var ch=Math.abs(cur-def)>0.0001;
    return'<div style="display:flex;align-items:center;gap:2px;margin:1px 0">'
      +'<span style="color:#9ca3af;font-size:8px;min-width:22px">'+yrs[i]+'</span>'
      +'<input class="drv-input'+(ch?" changed":"")+'" type="text" inputmode="decimal"'
      +' value="'+(cur*100).toFixed(1)+'" data-k="'+key+'" data-i="'+i+'">'
      +'</div>';
  }).join("");
  return'<td class="drv-td">'+ins+'</td>';
}
function secRow(lbl){ return'<tr class="sec-row"><td colspan="100">'+lbl+'</td></tr>'; }
// BU driver cell — same as dTd() but reads S.bu_drv[buName]
// dk format: "buName|key" e.g. "Creatives|cos_ext"
function buDTd(buName,key){
  if(!key)return'<td class="drv-td"></td>';
  var yrs=["FY26","FY27","FY28"];
  var ins=[0,1,2].map(function(i){
    var cur=S.bu_drv[buName][key+'_pct'][i];
    var def=BU_BASE_DRV[buName][key+'_pct'][i];
    var ch=Math.abs(cur-def)>0.0001;
    return'<div style="display:flex;align-items:center;gap:2px;margin:1px 0">'
      +'<span style="color:#9ca3af;font-size:8px;min-width:22px">'+yrs[i]+'</span>'
      +'<input class="bu-drv-input'+(ch?" changed":"")+'" type="text" inputmode="decimal"'
      +' value="'+(cur*100).toFixed(1)+'" data-bu="'+buName+'" data-k="'+key+'" data-i="'+i+'">'
      +'</div>';
  }).join("");
  return'<td class="drv-td">'+ins+'</td>';
}
function bRow(o){
  var isT=o.isT,isSub=o.isSub,isPct=o.isPct,ind=o.ind;
  var lbg=isT?"#111827":isSub?"#f1f5f9":"#fff";
  var lco=isT?"#fff":isSub?"#111827":"#374151";
  var lfw=isT||isSub?"font-weight:700":"";
  var aBg=isT?"#111827":"#eff6ff",mBg=isT?"#111827":"#f0fdf4",cBg=isT?"#111827":"#fffbeb";
  var bn=BENCH[o.bk];
  var h='<tr><td class="lc" style="background:'+lbg+';color:'+lco+';'+lfw+';padding-left:'+(ind?18:7)+'px">'+o.label+'</td>';
  if(!o.noAct) o.aV.forEach(function(v,i){h+=nTd(v,o.aR[i],aBg,isT,isPct);});
  o.mV.forEach(function(v,i){h+=nTd(v,o.mR[i],mBg,isT,isPct);});
  o.cV.forEach(function(v,i){h+=nTd(v,o.cR[i],cBg,isT,isPct);});
  h+=o.buName?buDTd(o.buName,o.dk):dTd(o.dk);
  h+='<td style="background:#f5f3ff;color:#7c3aed;font-size:9px;font-weight:700;text-align:center;border-left:1px solid #d1d5db;padding:3px 5px;white-space:nowrap">'+(bn?bn.pct:"&#8212;")+'</td>';
  h+='<td style="background:#f8fafc;color:#475569;font-size:9px;font-style:italic;text-align:left;padding:3px 7px;border-left:1px solid #e2e8f0;white-space:normal;line-height:1.4;min-width:160px">'+(bn&&bn.note?bn.note.replace(/</g,"&lt;").replace(/>/g,"&gt;"):"")+'</td>';
  h+='</tr>';
  return h;
}

function renderEntity(entity){

  var isCap=entity==="captains";

  var fR=F.rev.map(function(_,i){return Math.round(F.rev[i]*sc[5+i]);});
  var mGP=M.gp.map(function(_,i){return Math.round(M.gp[i]*sc[5+i]);});
  var fGP=F.gp.map(function(_,i){return Math.round(F.gp[i]*sc[5+i]);});
  var mSA=M.sa.map(function(_,i){return Math.round(M.sa[i]*sc[5+i]);});
  var fSA=F.sa.map(function(_,i){return Math.round(F.sa[i]*sc[5+i]);});

  var fGA=F.ga.map(function(_,i){return Math.round(F.ga[i]*sc[5+i]);});
  var mDp=M.dep.map(function(_,i){return Math.round(M.dep[i]*sc[5+i]);});
  var fDp=F.dep.map(function(_,i){return Math.round(F.dep[i]*sc[5+i]);});
  var mEB=mGP.map(function(_,i){return mGP[i]-mSA[i]-mGA[i];});
  var fEB=fGP.map(function(_,i){return fGP[i]-fSA[i]-fGA[i];});
  var mNP=mEB.map(function(_,i){return mEB[i]-mDp[i];});
  var fNP=fEB.map(function(_,i){return fEB[i]-fDp[i];});
  var aRe=aIdx.map(function(i){return rv[i];});

  h+=r({label:"Direct Employee COS",ind:true,aV:aIdx.map(function(i){return Math.round(ACT.cos_d[i]*sc[i]);}),mV:M.cos_d.map(function(_,i){return Math.round(M.cos_d[i]*sc[5+i]);}),cV:F.cos_d.map(function(_,i){return Math.round(F.cos_d[i]*sc[5+i]);}),dk:"cos_d_pct",bk:"cos_d_pct"});
  h+=r({label:"TOTAL COS",aV:aCos,mV:mGP.map(function(_,i){return mR[i]-mGP[i];}),cV:fGP.map(function(_,i){return fR[i]-fGP[i];}),isT:true,bk:"cos_t_pct"});
  h+=r({label:"GROSS PROFIT",aV:aGP,mV:mGP,cV:fGP,isT:true,isSub:true,bk:"gp_pct"});

      +'<td class="lc" style="background:#f1f5f9;font-weight:700;padding-left:8px">Gap (model − Excel)</td>';
    gaps.forEach(function(gap,i){
      var pct=boldNP_excel[i]?Math.abs(gap/boldNP_excel[i]):1;
      var col=pct<=0.05?'#16a34a':pct<=0.15?'#b45309':'#dc2626';
      var flag=pct<=0.05?'✓ aligned':pct<=0.15?'⚠ review':'✗ investigate';
      h+='<td style="background:#f1f5f9;text-align:right;padding:4px 8px;font-size:10px;font-weight:700;color:'+col+'">'
        +fmt(gap)+'<span style="font-size:8px;display:block">'+flag+'</span></td>';

      +'≤5% = green. 5-15% = amber. &gt;15% = red. Gap driven by HQ items not in BU files.</td></tr>';
    h+='</tbody></table></div></div>';
  }
  return h;
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN RENDER & INPUT LISTENERS
// ─────────────────────────────────────────────────────────────────────────────
var TABS=["Group P&L","Bold Co.","Teeb","Captains","Benchmarks","Open Items"];
var RENDERERS=[renderGroup,function(){return renderEntity("bold");},function(){return renderEntity("teeb");},function(){return renderEntity("captains");},renderBench,renderOI];

function fullRender(){
  renderHeader();
  updateKPIs();
  renderPlanner();
  renderTabs();
  document.getElementById("content-zone").innerHTML='<div class="content">'+RENDERERS[S.tab]()+'</div>';
  attachInputListeners();
  updateSaveStatus();
  // ── Sticky zone tops + table-wrap height ─────────────────────────────────
  function updateLayout(){
    var zones=["hdr-zone","kpi-zone","planner-zone","tabs-zone"];
    var top=0;
    zones.forEach(function(id){
      var el=document.getElementById(id);
      if(el){el.style.top=top+"px";top+=el.offsetHeight;}
    });
    // Give table-wrap a max-height so it scrolls internally
    // th position:sticky then resolves within table-wrap correctly
    // content-zone overflow-y:auto handles any content below (e.g. BU grid)
    var h="calc(100vh - "+top+"px - 20px)";
    document.querySelectorAll(".table-wrap").forEach(function(el){
      el.style.maxHeight=h;
    });
  }
  requestAnimationFrame(function(){
    updateLayout();
    setTimeout(updateLayout,150);
  });
  if(!window._layoutResizeSet){
    window._layoutResizeSet=true;
    window.addEventListener("resize",updateLayout);
  }
}

function attachInputListeners(){
  document.querySelectorAll(".bu-drv-input").forEach(function(inp){
    var fresh=inp.cloneNode(true);
    inp.parentNode.replaceChild(fresh,inp);
    fresh.addEventListener("input",function(e){
      var bu=e.target.dataset.bu,k=e.target.dataset.k,i=parseInt(e.target.dataset.i),v=parseFloat(e.target.value);
      if(!isNaN(v)){
        if(bu==="__entity"){
          S.entity_drv[k][i+1]=Math.round(v); // i=0→FY27(idx1), i=1→FY28(idx2)
          e.target.classList.toggle("changed",Math.abs(v-BOLD_ENTITY_BASE[k][i+1])>500);
        } else {
          S.bu_drv[bu][k+'_pct'][i]=v/100;
          var def=BU_BASE_DRV[bu][k+'_pct'][i];
          e.target.classList.toggle("changed",Math.abs(S.bu_drv[bu][k+'_pct'][i]-def)>0.0001);
        }
      }
    });
    fresh.addEventListener("blur",function(){
      document.getElementById("content-zone").innerHTML='<div class="content">'+RENDERERS[S.tab]()+'</div>';
      attachInputListeners();
      updateKPIs();
    });
  });
  document.querySelectorAll(".drv-input").forEach(function(inp){
    var fresh=inp.cloneNode(true);
    inp.parentNode.replaceChild(fresh,inp);
    fresh.addEventListener("input",function(e){
      var k=e.target.dataset.k,i=parseInt(e.target.dataset.i),v=parseFloat(e.target.value);
      if(!isNaN(v)){
        S.drv[k][i]=v/100;
        S.scenario="custom";
        updateKPIs();
        var def=BASE_DRV[k][i];
        e.target.classList.toggle("changed",Math.abs(S.drv[k][i]-def)>0.0001);
        if(saveTimer) clearTimeout(saveTimer);
        saveTimer=setTimeout(function(){
          if(currentVersion!=='none') saveDrivers(currentVersion);
        },900);
      }
    });
    fresh.addEventListener("blur",function(){
      document.getElementById("content-zone").innerHTML='<div class="content">'+RENDERERS[S.tab]()+'</div>';
      attachInputListeners();
      updateKPIs();
      renderPlanner();
    });
  });
}

async function saveDrivers(who){
  var shared=(who==='team');
  var key=shared?KEY_TEAM:KEY_MINE;
  var tsKey=shared?KEY_TM_TS:KEY_MY_TS;
  await storageSave(key,S.drv,shared);
  await storageSave(tsKey,ts(),shared);
}

// ─────────────────────────────────────────────────────────────────────────────
// GLOBAL HANDLERS
// ─────────────────────────────────────────────────────────────────────────────
window.setTab=function(i){S.tab=i;fullRender();};
window.setBF=function(f){S.bf=f;fullRender();};
window.togOI=function(id){S.oi[id]=S.oi[id]==="DONE"?"PENDING":"DONE";fullRender();};
window.setScenario=function(v){
  S.scenario=v;
  if(v!=="custom"){
    S.drv=deepCopy(v==="bull"?BULL_DRV:v==="bear"?BEAR_DRV:BASE_DRV);
    S.bu_drv=deepCopy(BU_BASE_DRV);
    S.entity_drv=deepCopy(BOLD_ENTITY_BASE);
  }
  fullRender();
};
window.slideRev=function(v){
  S.drv.rev_growth[0]=parseFloat(v)/100;
  S.scenario="custom";
  var el=document.getElementById("rev-slide-val");
  if(el) el.textContent=parseFloat(v).toFixed(1)+"%";
  updateKPIs();
};
window.openModal=openModal;
window.closeModal=closeModal;
window.doSave=doSave;
window.doLoad=doLoad;
window.doClear=doClear;

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
(async function boot(){
  // Try to auto-load team version first, then my version
  try{
    var team=await storageGet(KEY_TEAM,true);
    if(team){ S.drv=team; S.scenario='custom'; currentVersion='team'; showToast('Loaded Team Version ✓'); }
    else {
      var mine=await storageGet(KEY_MINE,false);
      if(mine){ S.drv=mine; S.scenario='custom'; currentVersion='mine'; showToast('Loaded My Version ✓'); }
    }
  }catch(e){}
  fullRender();
})();
</script>
